spring.application.name=medical-system-backend

# Render/Aiven MySQL config via environment variables
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Let Spring choose dialect automatically
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Mail via environment variables
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

# Optional: turn off verbose mail debug in production
spring.mail.properties.mail.debug=false

# Render injects PORT
server.port=${PORT:8080}

# Frontend origin(s)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}