<div class="clinic-page">

  <div class="hero-section">
    <span class="material-icons hero-icon">local_hospital</span>

    <h2>Find Nearby Clinics</h2>

    <p>
      Search healthcare facilities and clinics in your city
    </p>
  </div>

  <div class="search-card">

    <div class="search-box">
      <span class="material-icons search-icon">
        location_on
      </span>

      <input
        type="text"
        [(ngModel)]="location"
        placeholder="Enter city name" />

      <button (click)="search()">
        <span class="material-icons">
          search
        </span>

        Search
      </button>
    </div>

  </div>

  <div class="clinics-grid">

    <div
      class="clinic-card"
      *ngFor="let clinic of clinics">

      <div class="clinic-header">

        <span class="material-icons hospital-icon">
          local_hospital
        </span>

        <h3>{{ clinic.name }}</h3>

      </div>

      <div class="clinic-info">

        <p>
          <span class="material-icons">
            my_location
          </span>

          Latitude:
          {{ clinic.lat }}
        </p>

        <p>
          <span class="material-icons">
            explore
          </span>

          Longitude:
          {{ clinic.lon }}
        </p>

      </div>

    </div>

  </div>

</div>
